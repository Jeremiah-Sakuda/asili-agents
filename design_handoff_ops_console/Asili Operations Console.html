<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Asili — Operations Console</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; background: #F6F4EE; }
  body { font-family: "Geist", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  #app { width: 100vw; height: 100vh; }
  * { box-sizing: border-box; }

  /* Agent step entrance — the focal stream animates as each hand-off lands */
  @media (prefers-reduced-motion: no-preference) {
    .ops-step-in { animation: opsStepIn .42s cubic-bezier(.22,.61,.36,1); }
  }
  @keyframes opsStepIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Grounded-fact highlight pulse */
  @media (prefers-reduced-motion: no-preference) {
    .ops-fact-lit { animation: opsFactLit .5s ease; }
  }
  @keyframes opsFactLit {
    0%   { background: rgba(30,90,63,.0); }
    40%  { background: rgba(30,90,63,.18); }
    100% { background: rgba(30,90,63,.08); }
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #CFC9B7; border-radius: 6px; border: 2px solid #F6F4EE; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>

<!-- React + Babel (pinned) -->

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>

<!-- Design system (existing) -->

<script type="text/babel" src="shared.jsx"></script>

</html>
